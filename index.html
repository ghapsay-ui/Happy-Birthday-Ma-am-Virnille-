<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you very much for all the learnings, Ma'am Sarah Jane Buctuan! </title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #0a0e27;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        /* Matrix-style background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        /* Terminal intro screen */
        #terminal-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #terminal-intro.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .terminal-window {
            width: 90%;
            max-width: 700px;
            background: rgba(20, 25, 45, 0.95);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .terminal-header {
            background: rgba(15, 20, 35, 0.9);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .terminal-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff5f56;
        }

        .terminal-button:nth-child(2) {
            background: #ffbd2e;
        }

        .terminal-button:nth-child(3) {
            background: #27c93f;
        }

        .terminal-body {
            padding: 24px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #00ff88;
            min-height: 250px;
        }

        .terminal-line {
            opacity: 0;
            animation: fadeInLine 0.3s forwards;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #00ff88;
            margin-left: 2px;
            animation: blink 0.8s infinite;
        }

        @keyframes fadeInLine {
            to {
                opacity: 1;
            }
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0;
            }
        }

        /* Main content container */
        #main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #main-content.visible {
            opacity: 1;
        }

        /* Card container */
        .card-container {
            perspective: 1500px;
            width: 100%;
            max-width: 600px;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 80px rgba(0, 255, 136, 0.15);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 100px rgba(0, 255, 136, 0.25);
        }

        /* Animated gradient border */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ff88, #00d4ff, #9d4edd, #ff006e, #00ff88);
            border-radius: 24px;
            z-index: -1;
            opacity: 0.3;
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* Icon container */
        .icon-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .code-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* Typography */
        .greeting {
            font-size: 16px;
            font-weight: 400;
            color: #00ff88;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: slideUp 0.8s ease forwards 0.3s;
        }

        .recipient-name {
            font-size: 42px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: slideUp 0.8s ease forwards 0.5s;
        }

        .role-title {
            font-size: 18px;
            font-weight: 300;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            opacity: 0;
            animation: slideUp 0.8s ease forwards 0.7s;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            margin: 30px auto;
            opacity: 0;
            animation: slideUp 0.8s ease forwards 0.9s;
        }

        .message-text {
            font-size: 18px;
            line-height: 1.8;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            opacity: 0;
            animation: slideUp 0.8s ease forwards 1.1s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Particle effects */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: particleFloat 8s linear infinite;
            opacity: 0.6;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 100;
            animation: confettiFall 4s linear forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .terminal-body {
                font-size: 12px;
                padding: 20px;
            }

            .card {
                padding: 40px 30px;
            }

            .recipient-name {
                font-size: 32px;
            }

            .role-title {
                font-size: 16px;
            }

            .message-text {
                font-size: 16px;
            }

            .code-icon {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 480px) {
            .terminal-window {
                width: 95%;
            }

            .card {
                padding: 30px 20px;
            }

            .recipient-name {
                font-size: 28px;
            }

            .message-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Matrix background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Terminal intro -->
    <div id="terminal-intro">
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="terminal-button"></div>
                <div class="terminal-button"></div>
                <div class="terminal-button"></div>
            </div>
            <div class="terminal-body" id="terminal-text"></div>
        </div>
    </div>

    <!-- Main content -->
    <div id="main-content">
        <div class="card-container">
            <div class="card">
                <div class="icon-container">
                    <svg class="code-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.3"/>
                        <path d="M30 50 L40 40 M30 50 L40 60" stroke="url(#iconGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M70 50 L60 40 M70 50 L60 60" stroke="url(#iconGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="45" y1="65" x2="55" y2="35" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </div>

                <div class="greeting">Salamat Karajaw Ma'am. God Bless you</div>
                <h1 class="recipient-name">Ma'am Sarah Jane/h1>
                <div class="role-title">Instructor of the Parallel and Distributed Computing</div>
                
                <div class="divider"></div>
                
                <p class="message-text">
                    Thank you Ma'am for your unwavering dedication for teaching us all the knowledge and information that we need to know and learn. May God Bless you always. From your BSCS - 3B students. 
                </p>
            </div>
        </div>
    </div>

    <script>
        // Matrix rain effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff88';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Terminal typing effect
        const terminalLines = [
            '$ initializing birthday_protocol.exe',
            '> Loading recipient data...',
            '> Recipient: Maam Virnille Francisco',
            '> Department: College of Computing and Information Sciences',
            '> Status: ✓ Compilation successful',
            '> Preparing celebration sequence...',
            '> Rendering birthday card...',
            '> ✓ All systems ready',
            '$ launch celebration --mode=awesome'
        ];

        const terminalText = document.getElementById('terminal-text');
        let lineIndex = 0;

        function typeLine(line, callback) {
            const lineElement = document.createElement('div');
            lineElement.className = 'terminal-line';
            lineElement.style.animationDelay = '0s';
            terminalText.appendChild(lineElement);

            let charIndex = 0;
            const typeInterval = setInterval(() => {
                if (charIndex < line.length) {
                    lineElement.textContent += line[charIndex];
                    charIndex++;
                } else {
                    clearInterval(typeInterval);
                    if (callback) callback();
                }
            }, 30);
        }

        function typeNextLine() {
            if (lineIndex < terminalLines.length) {
                typeLine(terminalLines[lineIndex], () => {
                    lineIndex++;
                    setTimeout(typeNextLine, 200);
                });
            } else {
                setTimeout(() => {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    terminalText.appendChild(cursor);
                    setTimeout(transitionToCard, 800);
                }, 300);
            }
        }

        function transitionToCard() {
            document.getElementById('terminal-intro').classList.add('hidden');
            document.getElementById('main-content').classList.add('visible');
            createConfetti();
            createParticles();
        }

        // Confetti effect
        function createConfetti() {
            const colors = ['#00ff88', '#00d4ff', '#9d4edd', '#ff006e', '#ffbe0b'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }

        // Floating particles
        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (8 + Math.random() * 4) + 's';
                document.body.appendChild(particle);
            }
        }

        // Start the sequence
        setTimeout(typeNextLine, 500);

        // 3D card tilt effect
        const card = document.querySelector('.card');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
        });
    </script>
</body>
</html>
